services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: beforeme
      POSTGRES_PASSWORD: beforeme
      POSTGRES_DB: beforeme
    ports:
      - "5432:5432"
    volumes:
      - beforeme_pgdata:/var/lib/postgresql/data

volumes:
  beforeme_pgdata:
